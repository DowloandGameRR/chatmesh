<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobil Yoklama Sistemi</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --bg: #f8f9fa;
            --text: #2b2d42;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Sağa sola kaymayı engeller */
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card { display: none; }
        .card.active { display: block; animation: fadeIn 0.5s; }

        h2 { margin-bottom: 1.5rem; color: var(--primary); }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-teacher { background: #6c757d; margin-top: 20px; font-size: 0.8rem; }

        #preview {
            width: 100%;
            border-radius: 15px;
            background: #000;
            margin-top: 15px;
        }

        .user-list {
            text-align: left;
            margin-top: 20px;
            padding: 0;
            list-style: none;
        }

        .user-item {
            background: #f1f3f5;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ANA GİRİŞ EKRANI -->
    <div id="login-screen" class="card active">
        <h2>Öğrenci Girişi</h2>
        <input type="text" id="studentName" placeholder="Adınız ve Soyadınız">
        <button class="btn" onclick="startScanner()">Kamerayı Aç ve QR Oku</button>
        
        <button class="btn btn-teacher" onclick="showTeacherLogin()">Öğretmen Girişi</button>
    </div>

    <!-- QR TARAYICI EKRANI -->
    <div id="scanner-screen" class="card">
        <h2>QR Kodunu Taratın</h2>
        <video id="preview"></video>
        <button class="btn" style="background:#e63946" onclick="location.reload()">İptal</button>
    </div>

    <!-- ÖĞRETMEN GİRİŞ EKRANI -->
    <div id="teacher-login-screen" class="card">
        <h2>Öğretmen Paneli</h2>
        <input type="password" id="teacherPass" placeholder="Giriş Şifresi">
        <button class="btn" onclick="loginTeacher()">Giriş Yap</button>
        <button class="btn btn-teacher" onclick="location.reload()">Geri Dön</button>
    </div>

    <!-- ÖĞRETMEN PANELİ (YOKLAMA LİSTESİ) -->
    <div id="admin-panel" class="card">
        <h2>Sınıf Listesi</h2>
        <div id="qr-area">
            <!-- Burada dinamik QR oluşturulabilir -->
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=SINIF_GIRIS_2024" alt="Sınıf QR">
        </div>
        <ul class="user-list" id="studentList">
            <!-- Öğrenciler buraya eklenecek -->
        </ul>
        <button class="btn btn-teacher" onclick="location.reload()">Çıkış</button>
    </div>
</div>

<script>
    let currentName = "";

    function showTeacherLogin() {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById('teacher-login-screen').classList.add('active');
    }

    function loginTeacher() {
        const pass = document.getElementById('teacherPass').value;
        if(pass === "16153015") {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.getElementById('admin-panel').classList.add('active');
            // Burada Firebase'den mevcut listeyi çekme fonksiyonunu çalıştıracaksınız
        } else {
            Swal.fire('Hata', 'Hatalı Şifre!', 'error');
        }
    }

    function startScanner() {
        currentName = document.getElementById('studentName').value;
        if(!currentName) {
            Swal.fire('Uyarı', 'Lütfen isminizi yazın!', 'warning');
            return;
        }

        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById('scanner-screen').classList.add('active');

        let scanner = new Instascan.Scanner({ video: document.getElementById('preview'), mirror: false });
        
        scanner.addListener('scan', function (content) {
            if(content === "SINIF_GIRIS_2024") {
                saveToFirebase(currentName);
                scanner.stop();
                Swal.fire('Başarılı', 'Yoklamanız alındı!', 'success').then(() => {
                    location.reload();
                });
            }
        });

        Instascan.Camera.getCameras().then(function (cameras) {
            if (cameras.length > 0) {
                // Arka kamerayı seçmeye çalış (varsa)
                let selectedCam = cameras[cameras.length - 1]; 
                scanner.start(selectedCam);
            } else {
                alert('Kamera bulunamadı.');
            }
        }).catch(function (e) {
            console.error(e);
        });
    }

    // FIREBASE BAĞLANTISI İÇİN TASLAK FONKSİYON
    function saveToFirebase(name) {
        const now = new Date();
        const time = now.getHours() + ":" + now.getMinutes();
        
        console.log("Firebase'e kaydediliyor:", name, time);
        
        /* 
           Burada paylaştığın admin SDK yerine Web SDK kullanmalısın (Client side).
           Örnek:
           firebase.database().ref('yoklama/').push({
               isim: name,
               saat: time
           });
        */
    }
</script>

</body>
</html>
