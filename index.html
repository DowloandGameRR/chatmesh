<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profesyonel Yoklama Sistemi</title>
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <!-- QR & UI Kütüphaneleri -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-shell {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        header {
            padding: 25px;
            background: var(--primary);
            color: white;
            text-align: center;
            border-radius: 0 0 25px 25px;
        }

        .content { padding: 20px; flex-grow: 1; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-link { background: none; color: #64748b; margin-top: 10px; font-size: 14px; }

        #reader { width: 100% !important; border-radius: 15px; overflow: hidden; }

        .attendance-item {
            background: #f1f5f9;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <h2 id="title">Sınıf Yoklaması</h2>
    </header>

    <div class="content">
        <!-- ÖĞRENCİ GİRİŞ -->
        <div id="student-screen" class="screen active">
            <label>Adınız Soyadınız</label>
            <input type="text" id="stdName" placeholder="Örn: Ahmet Yılmaz">
            <button class="btn" onclick="startQR()">Kamerayı Aç ve QR Okut</button>
            <button class="btn btn-link" onclick="changeScreen('teacher-auth')">Öğretmen Girişi</button>
        </div>

        <!-- QR SCANNER -->
        <div id="scanner-screen" class="screen">
            <div id="reader"></div>
            <button class="btn" style="background:#ef4444; margin-top:15px;" onclick="location.reload()">İptal</button>
        </div>

        <!-- ÖĞRETMEN ŞİFRE -->
        <div id="teacher-auth" class="screen">
            <label>Öğretmen Şifresi</label>
            <input type="password" id="tPass" placeholder="••••">
            <button class="btn" onclick="checkTeacher()">Giriş Yap</button>
            <button class="btn btn-link" onclick="changeScreen('student-screen')">Geri Dön</button>
        </div>

        <!-- ÖĞRETMEN PANELİ -->
        <div id="admin-panel" class="screen">
            <div style="text-align:center; margin-bottom:20px;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=YOKLAMA_QR_2026" alt="QR">
                <p style="font-size:12px; color:gray;">Öğrencilere bu kodu taratın</p>
            </div>
            <div id="attendance-list">
                <p style="text-align:center; color:gray;">Liste yükleniyor...</p>
            </div>
            <button class="btn btn-link" onclick="location.reload()" style="color:red;">Çıkış Yap</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE KONFİGÜRASYONU ---
    const firebaseConfig = {
        apiKey: "AIzaSyAbX3PaysRyiG2QrP2okpofB3XcXB8Fyt4",
        authDomain: "online-yoklama-3d0a2.firebaseapp.com",
        databaseURL: "https://online-yoklama-3d0a2-default-rtdb.firebaseio.com",
        projectId: "online-yoklama-3d0a2",
        storageBucket: "online-yoklama-3d0a2.firebasestorage.app",
        messagingSenderId: "430013642186",
        appId: "1:430013642186:web:98e2b97aa41e9fa7738b33",
        measurementId: "G-D67XZY7WNN"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- EKRAN YÖNETİMİ ---
    function changeScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- ÖĞRENCİ: QR OKUTMA ---
    function startQR() {
        const name = document.getElementById('stdName').value;
        if(!name) return Swal.fire('Hata', 'Lütfen isminizi girin!', 'error');

        changeScreen('scanner-screen');
        const html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                if(decodedText === "YOKLAMA_QR_2026") {
                    html5QrCode.stop();
                    sendData(name);
                }
            }
        ).catch(err => Swal.fire('Hata', 'Kamera izni gerekiyor!', 'error'));
    }

    function sendData(name) {
        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        db.ref('yoklama_listesi').push({
            isim: name,
            saat: time,
            timestamp: Date.now()
        }).then(() => {
            Swal.fire('Başarılı', 'Yoklamanız kaydedildi!', 'success').then(() => location.reload());
        });
    }

    // --- ÖĞRETMEN: GİRİŞ VE LİSTE ---
    function checkTeacher() {
        if(document.getElementById('tPass').value === "16153015") {
            changeScreen('admin-panel');
            document.getElementById('title').innerText = "Öğretmen Paneli";
            loadList();
        } else {
            Swal.fire('Hata', 'Yanlış şifre!', 'error');
        }
    }

    function loadList() {
        // Bu fonksiyon Realtime Database'i canlı dinler
        db.ref('yoklama_listesi').orderByChild('timestamp').on('value', (snapshot) => {
            const listDiv = document.getElementById('attendance-list');
            listDiv.innerHTML = "";
            const data = snapshot.val();
            
            if(data) {
                // Verileri diziye çevirip en yeni en üstte olacak şekilde sıralıyoruz
                const items = Object.values(data).reverse();
                items.forEach(item => {
                    listDiv.innerHTML += `
                        <div class="attendance-item">
                            <span><b>${item.isim}</b></span>
                            <span style="color:#4f46e5;">${item.saat}</span>
                        </div>
                    `;
                });
            } else {
                listDiv.innerHTML = "<p style='text-align:center; color:gray;'>Henüz kimse giriş yapmadı.</p>";
            }
        });
    }
</script>

</body>
</html>
