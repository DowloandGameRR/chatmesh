<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profesyonel QR Yoklama Sistemi</title>
    <!-- Kütüphaneler -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        header h1 { margin: 0; font-size: 22px; font-weight: 800; }
        header p { margin: 5px 0 0; font-size: 14px; opacity: 0.9; }

        .content {
            padding: 25px;
            flex-grow: 1;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-box { margin-bottom: 20px; }
        .input-box label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-sub);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-ghost { background: transparent; color: var(--text-sub); margin-top: 15px; font-weight: 500; }

        #reader {
            width: 100% !important;
            border: none !important;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
        }

        .qr-display {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin: 20px auto;
            width: fit-content;
        }

        .list-container { margin-top: 25px; }
        .student-card {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--primary);
        }

        .student-info h4 { margin: 0; font-size: 15px; }
        .student-info span { font-size: 12px; color: var(--text-sub); }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <h1 id="header-title">Yoklama Sistemi</h1>
        <p id="header-subtitle">Dijital Sınıf Yönetimi</p>
    </header>

    <div class="content">
        <!-- EKRAN 1: ÖĞRENCİ GİRİŞ -->
        <div id="screen-student-login" class="screen active">
            <div class="input-box">
                <label>Öğrenci Adı Soyadı</label>
                <input type="text" id="studentName" placeholder="Adınızı yazın...">
            </div>
            <button class="btn" onclick="openScanner()">
                <span>Kamerayı Aç</span>
            </button>
            <button class="btn btn-ghost" onclick="showScreen('screen-teacher-auth')">Öğretmen Paneli</button>
        </div>

        <!-- EKRAN 2: QR TARAYICI -->
        <div id="screen-scanner" class="screen">
            <div id="reader"></div>
            <button class="btn" style="background:#ef4444; margin-top:20px;" onclick="location.reload()">Vazgeç</button>
        </div>

        <!-- EKRAN 3: ÖĞRETMEN ŞİFRE -->
        <div id="screen-teacher-auth" class="screen">
            <div class="input-box">
                <label>Yönetici Şifresi</label>
                <input type="password" id="teacherPass" placeholder="••••••••">
            </div>
            <button class="btn" onclick="verifyTeacher()">Giriş Yap</button>
            <button class="btn btn-ghost" onclick="showScreen('screen-student-login')">Geri Dön</button>
        </div>

        <!-- EKRAN 4: ÖĞRETMEN PANELİ -->
        <div id="screen-admin" class="screen">
            <div class="qr-display">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=SINIF_YOKLAMA_2024" alt="QR">
            </div>
            <p style="text-align:center; color:var(--text-sub); font-size:13px;">Öğrencilerin bu kodu taratması gerekir.</p>
            
            <div class="list-container">
                <h3 style="font-size:16px;">Sınıfa Giriş Yapanlar</h3>
                <div id="studentList">
                    <!-- Dinamik Liste -->
                </div>
            </div>
            <button class="btn btn-ghost" onclick="location.reload()" style="margin-top:30px; color:#ef4444;">Çıkış Yap</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE AYARLARI ---
    // NOT: Bu config bilgilerini Firebase Konsolu > Proje Ayarları > Web App kısmından almalısınız.
    const firebaseConfig = {
        apiKey: "BURAYA_KENDI_API_KEYINIZI_YAZIN",
        authDomain: "online-yoklama-3d0a2.firebaseapp.com",
        databaseURL: "https://online-yoklama-3d0a2-default-rtdb.firebaseio.com",
        projectId: "online-yoklama-3d0a2",
        storageBucket: "online-yoklama-3d0a2.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };

    // Firebase başlatma
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- EKRAN YÖNETİMİ ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        if(screenId === 'screen-admin') {
            document.getElementById('header-title').innerText = "Öğretmen Paneli";
            listenToAttendance();
        }
    }

    // --- ÖĞRENCİ İŞLEMLERİ ---
    let scannerObj = null;

    function openScanner() {
        const name = document.getElementById('studentName').value.trim();
        if(!name) {
            Swal.fire('Hata', 'Lütfen adınızı soyadınızı girin!', 'error');
            return;
        }

        showScreen('screen-scanner');

        scannerObj = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        scannerObj.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText) => {
                if(decodedText === "SINIF_YOKLAMA_2024") {
                    scannerObj.stop();
                    registerAttendance(name);
                }
            }
        ).catch(err => {
            Swal.fire('Kamera Hatası', 'Kamera izni verilmedi veya site HTTPS üzerinden açılmadı.', 'error');
        });
    }

    function registerAttendance(name) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        
        const entryRef = database.ref('yoklama').push();
        entryRef.set({
            isim: name,
            saat: timeStr,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            Swal.fire({
                title: 'Kayıt Başarılı',
                text: `Hoş geldin ${name}, girişin yapıldı.`,
                icon: 'success',
                timer: 2500
            }).then(() => location.reload());
        });
    }

    // --- ÖĞRETMEN İŞLEMLERİ ---
    function verifyTeacher() {
        const pass = document.getElementById('teacherPass').value;
        if(pass === "16153015") {
            showScreen('screen-admin');
        } else {
            Swal.fire('Hata', 'Giriş şifresi yanlış!', 'error');
        }
    }

    function listenToAttendance() {
        const listDiv = document.getElementById('studentList');
        database.ref('yoklama').limitToLast(50).on('value', (snapshot) => {
            listDiv.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                // Verileri sondan başa (en yeni üstte) sıralayalım
                const items = Object.values(data).reverse();
                items.forEach(item => {
                    listDiv.innerHTML += `
                        <div class="student-card">
                            <div class="student-info">
                                <h4>${item.isim}</h4>
                                <span>Giriş Zamanı</span>
                            </div>
                            <div style="font-weight:bold; color:var(--primary)">${item.saat}</div>
                        </div>
                    `;
                });
            } else {
                listDiv.innerHTML = "<p style='text-align:center; color:#94a3b8;'>Henüz kimse gelmedi.</p>";
            }
        });
    }
</script>

</body>
</html>
